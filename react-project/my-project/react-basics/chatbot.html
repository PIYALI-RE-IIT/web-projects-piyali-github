<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
        body{
            font-family: Arial;
            margin-top:0px;
            margin-bottom:0px;
        }
        .send-button{
            background-color: rgb(25 135 84);
            color:white;
            padding:12px 20px;
            margin-left:10px;
            border:none;
            border-radius:10px;
            font-size:15px;
            cursor: pointer;
        }
        .chat-input{
            padding:12px 15px;
            border-radius:10px;
            border-width:1px;
            font-size: 15px;
            flex-grow:1;
        }
        .chat-input-container{
            display:flex;
            margin-bottom: 60px;
        }
        .app-container{
            max-width: 1600px;
            margin-left:auto;
            margin-right:auto;
            height:100vh;
            display:flex;
            flex-direction: column;
        }
        .chat-message-user{
            display:flex;
            justify-content:end;
            align-items: start;
        }
        .chat-message-robot{
            display:flex;
            align-items: start;
        }
        .chat-message-text{
           background-color: rgb(238, 238, 238); 
           padding:15px 20px;
           border-radius: 10px;
           margin-right:10px;
           margin-left:10px;
           margin-bottom: 20px;
           max-width: 300px;
        }
        .chat-message-profile{
            width: 45px;
        }
        .chat-messages-container{
            flex-grow: 1;
            margin-top: 20px;
            overflow: scroll;
            scrollbar-width: none;
        }
        .loading-spinner{
            height: 40px;
            margin: -15px;
        }
    </style>
  </head>
  <body>
    <!-----initiallization of container for react-->
    <div class="js-container"></div>

    <script src="react-basics.js"></script>

    <!--Needed External library files for starting code with react.js, mainly for websites-->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <!----initialize react with babble--->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function ChatInput({chatMessages, setChatMessages}){///component 1

            const [inputText, setInputText] = React.useState('');

            function saveInputText(event){
                setInputText(event.target.value);
            }

            async function sendMessage(){

                 setInputText('');

                const newChatMessages = [...chatMessages,
                    {
                        message: inputText,
                        sender: 'user',
                        id: crypto.randomUUID()
                    }];
                     setChatMessages([
                        ...newChatMessages,
                        // This creates a temporary Loading... message.
                        // Because we don't save this message in newChatMessages,
                        // it will be remove later, when we add the response.
                        {
                        message: <img className="loading-spinner" src="loading-spinner.gif"/>,
                        sender: 'robot',
                        id: crypto.randomUUID()
                        }
                    ]);
               
                    const response= await Chatbot.getResponseAsync(inputText);
                    setChatMessages([
                        ...newChatMessages,
                        {
                            message: response,
                            sender: 'robot',
                            id: crypto.randomUUID()
                        }
                    ]); 

       
            }

            function enterKey(event){
                if (event.key === 'Enter') {
                    sendMessage();
                }
            }
            function escKey(event){
                if (event.key === 'Escape') {
                    setInputText('');
                }
            }

            return (
            <div className="chat-input-container">
              <input
                className="chat-input"
                placeholder="Send a message to Chatbot" 
                size="50"
                onChange = {saveInputText}
                value={inputText}
                //onKeyDown={enterKey}
               />
            <button className="send-button" onClick={sendMessage}>Send</button>
                
            </div>

            );
        }

        function ChatMessageSetUp({message,sender}){///use PascalCase letter format in function naming ///component 2
            
                ///if statement shortcuts below
            return (
                <div className={sender === 'user' ? 'chat-message-user':'chat-message-robot'}>
                    {sender === 'robot' && (
                        <img src="robot.png" className="chat-message-profile"/>
                    )}
                    <div className="chat-message-text">
                        {message}
                    </div>
                    {sender === 'user' && (
                        <img src="user.png" className="chat-message-profile"/>
                    )}                
                </div>

            );
        }

function ChatMessagesContent({chatMessages}){///component 3

    const chatMessagesRef = React.useRef(null);

    React.useEffect(() => {
       const containerElem = chatMessagesRef.current;
       if(containerElem){
        containerElem.scrollTop = containerElem.scrollHeight;
       }
    }, [chatMessages])

     return(
        <div className="chat-messages-container" ref={chatMessagesRef}>
            
            {chatMessages.map((chatMessageProp) => {
                return(
                    <ChatMessageSetUp 
                        message ={chatMessageProp.message}
                        sender = {chatMessageProp.sender} 
                        key = {chatMessageProp.id}           
                    />
                );
            })}
        </div>
        )
}

function App(){/*-------------------------Both does same thing-----{ChatInput()} or <ChatInput></ChatInput>--------*///component 4 and FINAL comp

   const [chatMessages, setChatMessages] = React.useState([   ]);
    var text;  
   function showLine(){
    if (chatMessages.length === 0){
        text = "Welcome to the chatbot project! Send a message using the textbox below.";
    }
    else{
        text = " ";
    }
   }
     
    return(
        <div className="app-container">              
            {showLine}
            <ChatMessagesContent 

            chatMessages = {chatMessages}
            />
            <ChatInput
            chatMessages={chatMessages}
            setChatMessages={setChatMessages}            
            />
                    
        </div>

    );
}
        const container = document.querySelector('.js-container');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
    <!-------------------->
  </body>
</html>
