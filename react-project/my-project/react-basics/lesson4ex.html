<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
        body{
            font-family: Arial;
            margin-top:0px;
            margin-bottom:0px;
        }
        .onBtn{
            background-color: rgb(25, 135, 84);
            color:white;
            padding:12px 20px;
            margin-left:10px;
            margin-top:10px;
            border:none;
            border-radius:10px;
            font-size:15px;
            cursor: pointer;
        }
        .offBtn{
            background-color: rgb(220, 53, 69);
            color:white;
            padding:12px 20px;
            margin-left:10px;
            margin-top:10px;
            border:none;
            border-radius:10px;
            font-size:15px;
            cursor: pointer;
        }
        .chat-input{
            padding:12px 15px;
            border-radius:10px;
            border-width:1px;
            font-size: 15px;
            flex-grow:1;
        }
        .chat-input-container{
            display:flex;
            margin-bottom: 60px;
        }
        .app-container{
            max-width: 1600px;
            margin-left:auto;
            margin-right:auto;
            height:100vh;
            display:flex;
            flex-direction: column;
        }
        .chat-message-user{
            display:flex;
            justify-content:end;
            align-items: start;
        }
        .chat-message-robot{
            display:flex;
            align-items: start;
        }
        .chat-message-text{
           background-color: rgb(238, 238, 238); 
           padding:15px 20px;
           border-radius: 10px;
           margin-right:10px;
           margin-left:10px;
           margin-bottom: 20px;
           max-width: 300px;
        }
        .chat-message-profile{
            width: 45px;
        }
        .chat-messages-container{
            flex-grow: 1;
            margin-top: 20px;
            overflow: scroll;
            scrollbar-width: none;
        }
    </style>
  </head>
  <body>
    <!-----initiallization of container for react-->
    <div class="js-container"></div>

    <script src="react-basics.js"></script>

    <!--Needed External library files for starting code with react.js, mainly for websites-->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <!----initialize react with babble--->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        
function App(){/*-------------------------Both does same thing-----{ChatInput()} or <ChatInput></ChatInput>--------*///component 4 and FINAL comp

    const [isButtonOn, setIsButtonOn] = React.useState(true);
      
   function switchButtonOn() {
          // Another solution is: setIsButtonOn(!isButtonOn);
          if (isButtonOn) {
            setIsButtonOn(false);
          } else {
            setIsButtonOn(true);
          }
        }

        return (
          <button
            className={isButtonOn ? "onBtn":"offBtn"}
            onClick={switchButtonOn}
          >
            {isButtonOn ? 'ON' : 'OFF'}

          </button>
        );
}
        const container = document.querySelector('.js-container');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
    <!-------------------->
  </body>
</html>
