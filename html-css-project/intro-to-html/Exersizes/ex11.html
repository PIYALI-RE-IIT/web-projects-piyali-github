<!doctype html>
<html>
  <head>
    <title>CSS Grid Practice</title>
    <style>
      .div-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        column-gap: 20px;
        row-gap: 10px;
      }
      .column-class {
        background-color: lightpink;
      }
    </style>
  </head>
  <body>
    <div class="div-grid">
      <div class="column-class">col1</div>
      <div class="column-class">col2</div>
      <div class="column-class">col3</div>
      <div class="column-class">col4</div>
      <div class="column-class">col1</div>
      <div class="column-class">col2</div>
      <div class="column-class">col3</div>
      <div class="column-class">col4</div>
    </div>
  </body>
</html>
